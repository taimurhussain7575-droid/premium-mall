<!DOCTYPE html>
<html>
<head>
<title>PREMIUM MALL</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0a58ca;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#222;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.search{
text-align:center;
margin:20px;
}

input{
padding:10px;
width:250px;
}

.categories{
text-align:center;
margin-bottom:20px;
}

.categories button{
margin:5px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
margin:15px;
padding:15px;
width:200px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#0a58ca;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

.cart{
position:fixed;
right:10px;
top:90px;
background:white;
padding:15px;
width:230px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

footer{
background:#222;
color:white;
text-align:center;
padding:10px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>PREMIUM MALL STORE</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Categories</a>
<a href="#">Contact</a>
</nav>

<div class="search">
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div class="categories">

<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('fashion')">Fashion</button>
<button onclick="filterCategory('electronics')">Electronics</button>

</div>

<div class="products" id="productList">

<div class="card fashion">
<img src="https://via.placeholder.com/150">
<h3>Men Shoes</h3>
<p>⭐⭐⭐⭐☆</p>
<p>Rs 3000</p>

<button onclick="addToCart('Men Shoes',3000)">Add to Cart</button>

<a href="https://wa.me/923181668155?text=I want to order Men Shoes" target="_blank">
<button>Order on WhatsApp</button>
</a>

</div>

<div class="card electronics">
<img src="https://via.placeholder.com/150">
<h3>Smart Watch</h3>
<p>⭐⭐⭐⭐⭐</p>
<p>Rs 2500</p>

<button onclick="addToCart('Smart Watch',2500)">Add to Cart</button>

<a href="https://wa.me/923181668155?text=I want to order Smart Watch" target="_blank">
<button>Order on WhatsApp</button>
</a>

</div>

<div class="card electronics">
<img src="https://via.placeholder.com/150">
<h3>Wireless Earbuds</h3>
<p>⭐⭐⭐⭐☆</p>
<p>Rs 1800</p>

<button onclick="addToCart('Earbuds',1800)">Add to Cart</button>

<a href="https://wa.me/923181668155?text=I want to order Earbuds" target="_blank">
<button>Order on WhatsApp</button>
</a>

</div>

</div>

<div class="cart">

<h3>Your Cart</h3>

<div id="cartItems"></div>

<p>Total: Rs <span id="total">0</span></p>

<button onclick="clearCart()">Clear</button>

</div>

<footer>
<p>© 2026 Premium Mall Pakistan</p>
</footer>

<script>

let cart=[]
let total=0

function addToCart(name,price){

cart.push({name,price})

total+=price

displayCart()

}

function displayCart(){

let cartHTML=""

cart.forEach(item=>{
cartHTML+=item.name+" - Rs "+item.price+"<br>"
})

document.getElementById("cartItems").innerHTML=cartHTML
document.getElementById("total").innerText=total

}

function clearCart(){

cart=[]
total=0
displayCart()

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()
let cards=document.getElementsByClassName("card")

for(let i=0;i<cards.length;i++){

let title=cards[i].getElementsByTagName("h3")[0]

if(title.innerText.toLowerCase().indexOf(input)>-1){

cards[i].style.display="block"

}else{

cards[i].style.display="none"

}

}

}

function filterCategory(category){

let cards=document.getElementsByClassName("card")

for(let i=0;i<cards.length;i++){

if(category=="all"){

cards[i].style.display="block"

}

else if(cards[i].classList.contains(category)){

cards[i].style.display="block"

}

else{

cards[i].style.display="none"

}

}

}

</script>

</body>
</html>
